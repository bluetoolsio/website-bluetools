<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Animated OctoPie preview</title>
  <desc id="desc">A dark Blender-style OctoPie radial menu with softly animated red interface highlights.</desc>
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#3f121c" stop-opacity="0.72"/>
      <stop offset="42%" stop-color="#12070c" stop-opacity="1"/>
      <stop offset="100%" stop-color="#040306" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#3b3b38"/>
      <stop offset="0.52" stop-color="#252523"/>
      <stop offset="1" stop-color="#060607"/>
    </linearGradient>
    <linearGradient id="slot" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#202022"/>
      <stop offset="1" stop-color="#070708"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="22" stdDeviation="30" flood-color="#000" flood-opacity="0.58"/>
    </filter>
    <filter id="redGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .pulse { animation: pulse 3.2s ease-in-out infinite; transform-origin: 640px 370px; }
      .orbit { animation: orbit 12s linear infinite; transform-origin: 640px 370px; }
      .float { animation: float 4.8s ease-in-out infinite; }
      .slot { animation: slotGlow 4s ease-in-out infinite; }
      .slot:nth-of-type(2n) { animation-delay: .45s; }
      .slot:nth-of-type(3n) { animation-delay: .9s; }
      .spark { animation: sparkle 2.6s ease-in-out infinite; transform-origin: center; }
      .scan { animation: scan 5.5s ease-in-out infinite; }
      @keyframes pulse { 0%,100% { transform: scale(1); opacity: .72; } 50% { transform: scale(1.08); opacity: 1; } }
      @keyframes orbit { to { transform: rotate(360deg); } }
      @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
      @keyframes slotGlow { 0%,100% { opacity: .72; } 50% { opacity: 1; } }
      @keyframes sparkle { 0%,100% { transform: scale(.9) rotate(0deg); opacity: .68; } 50% { transform: scale(1.16) rotate(8deg); opacity: 1; } }
      @keyframes scan { 0% { transform: translateY(-190px); opacity: 0; } 18%,70% { opacity: .26; } 100% { transform: translateY(245px); opacity: 0; } }
      @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bgGlow)"/>
  <circle class="pulse" cx="640" cy="370" r="285" fill="#ff244f" opacity="0.08" filter="url(#redGlow)"/>

  <g filter="url(#softShadow)">
    <rect x="96" y="72" width="1088" height="576" rx="30" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.12"/>
    <rect x="112" y="88" width="1056" height="544" rx="24" fill="#08070b" stroke="#ff244f" stroke-opacity="0.10"/>

    <g class="float">
      <text x="150" y="138" fill="#ff345d" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="9">FEATURED TOOL</text>
      <rect x="150" y="160" width="74" height="74" rx="12" fill="#ff244f" fill-opacity="0.16" stroke="#ff4567" stroke-opacity="0.28"/>
      <text x="245" y="211" fill="#f4f0f3" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="900" letter-spacing="-2">OctoPie</text>
      <path d="M190 178c16 8 25 20 27 37-14 4-31 3-45-6-10-6-16-16-17-28 12-7 24-8 35-3Z" fill="#ff244f" opacity="0.9"/>
      <path d="M188 184c-15 2-27 11-33 25m43-11c-18 12-27 25-28 41m31-38c7 19 4 35-8 49m12-48c18 8 31 21 38 39" stroke="#ff7a92" stroke-width="4" stroke-linecap="round" opacity="0.75"/>
      <path class="spark" d="M1034 173l13 31 31 13-31 13-13 31-13-31-31-13 31-13 13-31Z" stroke="#ff345d" stroke-width="7" stroke-linejoin="round"/>
      <path class="spark" d="M1082 158l5 12 12 5-12 5-5 12-5-12-12-5 12-5 5-12Z" stroke="#ff345d" stroke-width="5" stroke-linejoin="round"/>
      <path class="spark" d="M1002 249l4 10 10 4-10 4-4 10-4-10-10-4 10-4 4-10Z" stroke="#ff345d" stroke-width="4" stroke-linejoin="round"/>
    </g>

    <line x1="150" y1="256" x2="1130" y2="256" stroke="#fff" stroke-opacity="0.11"/>

    <g transform="translate(150 286)">
      <rect width="980" height="300" rx="22" fill="#111113" stroke="#ffffff" stroke-opacity="0.11"/>
      <rect width="980" height="300" rx="22" fill="url(#panel)" opacity="0.9"/>
      <rect class="scan" x="0" y="0" width="980" height="72" fill="url(#slot)" opacity="0.32"/>
      <rect y="200" width="980" height="100" fill="url(#slot)" opacity="0.66"/>

      <g class="orbit" opacity="0.55">
        <circle cx="490" cy="150" r="132" stroke="#ff244f" stroke-opacity="0.22" stroke-width="2" stroke-dasharray="10 20"/>
      </g>
      <g class="pulse">
        <circle cx="490" cy="150" r="28" fill="#050506" stroke="#232326" stroke-width="8"/>
        <circle cx="490" cy="150" r="14" fill="#ff244f" opacity="0.14"/>
      </g>
      <text x="430" y="111" fill="#bdb8bd" fill-opacity="0.38" font-family="Inter, Arial, sans-serif" font-size="16">Pie 1 | Smart Pie</text>

      <g fill="url(#slot)" stroke="#202024" stroke-width="2" font-family="Inter, Arial, sans-serif">
        <g class="slot"><rect x="420" y="36" width="140" height="42" rx="4"/><text x="438" y="63" fill="#eee" fill-opacity="0.72" font-size="17">None</text><text x="535" y="63" fill="#777" font-size="16">8</text></g>
        <g class="slot"><rect x="612" y="92" width="140" height="42" rx="4"/><text x="630" y="119" fill="#eee" fill-opacity="0.72" font-size="17">None</text><text x="728" y="119" fill="#777" font-size="16">9</text></g>
        <g class="slot"><rect x="662" y="184" width="140" height="42" rx="4"/><text x="680" y="211" fill="#eee" fill-opacity="0.72" font-size="17">None</text><text x="778" y="211" fill="#777" font-size="16">6</text></g>
        <g class="slot"><rect x="612" y="244" width="140" height="42" rx="4"/><text x="630" y="271" fill="#eee" fill-opacity="0.72" font-size="17">None</text><text x="728" y="271" fill="#777" font-size="16">3</text></g>
        <g class="slot"><rect x="420" y="244" width="140" height="42" rx="4"/><text x="438" y="271" fill="#eee" fill-opacity="0.72" font-size="17">None</text><text x="535" y="271" fill="#777" font-size="16">2</text></g>
        <g class="slot"><rect x="228" y="244" width="140" height="42" rx="4"/><text x="246" y="271" fill="#eee" fill-opacity="0.72" font-size="17">None</text><text x="343" y="271" fill="#777" font-size="16">1</text></g>
        <g class="slot"><rect x="178" y="184" width="140" height="42" rx="4"/><text x="196" y="211" fill="#eee" fill-opacity="0.72" font-size="17">None</text><text x="294" y="211" fill="#777" font-size="16">4</text></g>
        <g class="slot"><rect x="228" y="92" width="140" height="42" rx="4"/><text x="246" y="119" fill="#eee" fill-opacity="0.72" font-size="17">None</text><text x="343" y="119" fill="#777" font-size="16">7</text></g>
      </g>
    </g>
  </g>
</svg>
